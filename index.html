<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sheet 萬事屋 — 工具總覽</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 800px; margin: 60px auto; padding: 0 24px; color: #333; }
    h1 { font-size: 2rem; margin-bottom: 0.25em; }
    .subtitle { color: #666; margin-bottom: 2.5em; }
    .tool-list { list-style: none; padding: 0; }
    .tool-list li { border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 12px; }
    .tool-list a { display: block; padding: 20px 24px; text-decoration: none; color: inherit; }
    .tool-list a:hover { background: #f8f8f8; border-radius: 8px; }
    .tool-code { font-size: 0.85rem; color: #888; font-family: monospace; }
    .tool-name { font-size: 1.1rem; font-weight: 600; margin: 4px 0; }
    .tool-desc { font-size: 0.9rem; color: #555; }
    .site-logo { height: 104px; display: block; margin-bottom: 20px; }
  </style>
</head>
<body>
  <img src="assets/logo.webp?v=0c67898f" alt="Sheet 萬事屋" class="site-logo">
  <p class="subtitle">Google Apps Script 自動化工具集</p>

  <ul class="tool-list">
    <li>
      <a href="a01-news-radar/">
        <div class="tool-code">A#01</div>
        <div class="tool-name">產業新聞雷達</div>
        <div class="tool-desc">自動抓取 Google News RSS，每天定時推播新聞摘要到 Email 或 LINE</div>
      </a>
    </li>
    <!-- 未來工具依序加在此處 -->
  </ul>
</body>
</html>
